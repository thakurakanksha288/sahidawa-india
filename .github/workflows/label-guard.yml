name: 🛑 Strict Label Enforcement

on:
    issues:
        types: [labeled]
    pull_request:
        types: [labeled]
    pull_request_target:
        types: [labeled]

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    label-enforcer:
        runs-on: ubuntu-latest
        steps:
            - name: Enforce label rules
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const actor = context.actor;
                      const label = context.payload.label.name;
                      const issueNumber = context.issue.number;
                      const repoOwner = context.repo.owner;
                      const repoName = context.repo.repo;

                      if (actor === 'github-actions[bot]' || actor === repoOwner) {
                        console.log(`✅ Label "${label}" added by authorized actor @${actor}`);
                        return;
                      }

                      try {
                        const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                          owner: repoOwner,
                          repo: repoName,
                          username: actor,
                        });

                        const isAllowed = ['admin', 'write'].includes(permission.permission);

                        if (!isAllowed) {
                          console.log(`❌ Unauthorized actor @${actor} added label "${label}". Removing...`);
                          
                          await github.rest.issues.removeLabel({
                            owner: repoOwner,
                            repo: repoName,
                            issue_number: issueNumber,
                            name: label
                          });

                          await github.rest.issues.createComment({
                            owner: repoOwner,
                            repo: repoName,
                            issue_number: issueNumber,
                            body: `⚠️ Label \`${label}\` was removed. Only repository maintainers can add labels.`
                          });
                        } else {
                          console.log(`✅ Label "${label}" added by authorized maintainer @${actor}`);
                        }
                      } catch (error) {
                        console.error(`🚨 Failed to check permissions or remove label: ${error.message}`);
                      }
